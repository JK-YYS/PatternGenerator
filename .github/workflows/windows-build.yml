name: Build Windows App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable executable
        run: npm run dist

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PatternGenerator-windows
          path: |
            dist/*.exe
            dist/win-unpacked/**
